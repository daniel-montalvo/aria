name: Preview

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_EXECUTABLE_PATH: '/usr/bin/google-chrome'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    strategy:
      max-parallel: 1
      matrix:
        include:
          - source: index.html
            destination: public/index.html
          - source: core-aam/index.html
            destination: public/core-aam/index.html
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build relative links
        run: bash ./common/script/pr-preview.sh

      - name: Build specs
        uses: w3c/spec-prod@v2
        with:
          SOURCE: ${{ matrix.source }}
          DESTINATION: ${{ matrix.destination }}

    deploy:
      needs: build
      - name: Deploy site to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./public"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: ${{ github.event.pull_request.title }}
          alias: deploy-preview-${{ github.event.number }}
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Update PR comment with preview and diff links
        env:
          SITE_NAME: staging-aria
        run: |
          node common/script/prComment.mjs \
            --repo ${{ github.repository }} \
            --pull_request_number ${{ github.event.pull_request.number }} \
            --token ${{ secrets.GITHUB_TOKEN }} \
            --update_pr
