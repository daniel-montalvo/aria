name: mathml-aam ED build
on:
  push:
    branches:
      - 'main'
    paths:
      - 'common/**'
      - 'mathml-aam/**'
      - '.github/workflows/mathml-aam.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  update-mathml-aam-ed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: mathml-aam/index.html
          DESTINATION: mathml-aam/index.html
          GH_PAGES_BRANCH: gh-pages
          BUILD_FAIL_ON: nothing
